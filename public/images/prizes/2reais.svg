  <text x="260" y="80" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.5))">2</text>
  
